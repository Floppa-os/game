<!DOCTYPE html>
<html>
<head>
    <title>Змейка</title>
</head>
<body>
    <h1>Змейка</h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div>Счёт: <span id="score">0</span></div>
    <script>
        // Получаем canvas и контекст для рисования
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');

        // Настройки игры
        const gridSize = 20; // Размер клетки
        const tileCount = 20; // Количество клеток по ширине/высоте
        let score = 0;

        // Змейка (начинаем с левого верхнего угла, чтобы точно видеть)
        let snake = [
            {x: 1, y: 1} // Начальная позиция головы — угол поля
        ];
        let velocityX = 0;
        let velocityY = 0;
        let nextVelocityX = 0;
        let nextVelocityY = 0;

        // Яблоко
        let apple = {x: 5, y: 5};

        // Генерируем новое яблоко
        function generateApple() {
            apple.x = Math.floor(Math.random() * tileCount);
            apple.y = Math.floor(Math.random() * tileCount);

            // Проверяем, чтобы яблоко не появилось на змейке
            for (let part of snake) {
                if (part.x === apple.x && part.y === apple.y) {
                    generateApple();
                    return;
                }
            }
        }

        // Обработка клавиш
        document.addEventListener('keydown', function(e) {
            switch (e.key) {
                case 'ArrowUp':
                    if (velocityY !== 1) {
                        nextVelocityX = 0;
                        nextVelocityY = -1;
                    }
                    break;
                case 'ArrowDown':
                    if (velocityY !== -1) {
                        nextVelocityX = 0;
                        nextVelocityY = 1;
                    }
                    break;
                case 'ArrowLeft':
                    if (velocityX !== 1) {
                        nextVelocityX = -1;
                        nextVelocityY = 0;
                    }
                    break;
                case 'ArrowRight':
                    if (velocityX !== -1) {
                        nextVelocityX = 1;
                        nextVelocityY = 0;
                    }
                    break;
            }
        });

        // Основной игровой цикл
        function gameLoop() {
            velocityX = nextVelocityX;
            velocityY = nextVelocityY;

            // Двигаем змейку
            const head = {
                x: snake.x + velocityX,
                y: snake.y + velocityY
            };

            // Проверка столкновений со стенами
            if (
                head.x < 0 || head.x >= tileCount ||
                head.y < 0 || head.y >= tileCount
            ) {
                resetGame();
                return;
            }

            // Проверка столкновения с собой
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    resetGame();
                    return;
                }
            }

            // Добавляем голову
            snake.unshift(head);

            // Проверка, съела ли змейка яблоко
            if (head.x === apple.x && head.y === apple.y) {
                score++;
                scoreDisplay.textContent = score;
                generateApple();
            } else {
                // Удаляем хвост, если яблоко не съедено
                snake.pop();
            }

            // Отрисовываем всё
            draw();

            // Запускаем следующий кадр через 100 мс
            setTimeout(gameLoop, 100);
        }

        // Отрисовка
        function draw() {
            // Очищаем canvas
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Рисуем змейку (зелёные квадраты)
            ctx.fillStyle = 'green';
            for (let part of snake) {
                ctx.fillRect(
                    part.x * gridSize,
                    part.y * gridSize,
                    gridSize - 1,
                    gridSize - 1
                );
            }

            // Рисуем яблоко (красный квадрат)
            ctx.fillStyle = 'red';
            ctx.fillRect(
                apple.x * gridSize,
                apple.y * gridSize,
                gridSize - 1,
                gridSize - 1
            );
        }

        // Сброс игры
        function resetGame() {
            snake = [{x: 1, y: 1}];
            velocityX = 0;
            velocityY = 0;
            nextVelocityX = 0;
            nextVelocityY = 0;
            score = 0;
            scoreDisplay.textContent = score;
            generateApple();
        }

        // Запуск игры (эта строка ОБЯЗАТЕЛЬНА!)
        generateApple();
        gameLoop();
    </script>
</body>
</html>
