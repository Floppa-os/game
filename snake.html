<!DOCTYPE html>
<html>
<head>
    <title>Змейка</title>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <script>
        // Получаем canvas и контекст для рисования
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Настройки игры
        const gridSize = 20; // Размер клетки
        const tileCount = 20; // Количество клеток по горизонтали/вертикали

        // Змейка
        let snake = [
            {x: 10, y: 10} // Начальная позиция головы змейки
        ];
        let velocityX = 0;
        let velocityY = 0;

        // Еда
        let food = {
            x: Math.floor(Math.random() * tileCount),
            y: Math.floor(Math.random() * tileCount)
        };

        // Основной игровой цикл
        function gameLoop() {
            // Обновляем положение змейки
            updateSnake();

            // Проверяем столкновения
            if (checkCollision()) {
                resetGame();
                return;
            }

            // Проверяем, съела ли змейка еду
            if (snake[0].x === food.x && snake[0].y === food.y) {
                // Увеличиваем змейку
                snake.unshift({x: food.x, y: food.y});
                // Создаём новую еду
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } else {
                // Перемещаем змейку (удаляем последний сегмент)
                snake.pop();
            }

            // Рисуем всё
            draw();

            // Запускаем следующий кадр через 100 мс
            setTimeout(gameLoop, 100);
        }

        // Обновление положения змейки
        function updateSnake() {
            const head = {x: snake[0].x + velocityX, y: snake[0].y + velocityY};
            snake.unshift(head);
        }

        // Проверка столкновений
        function checkCollision() {
            const head = snake[0];

            // Столкновение со стенами
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                return true;
            }

            // Столкновение с собой
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return true;
                }
            }

            return false;
        }

        // Отрисовка всего на экране
        function draw() {
            // Очищаем экран (заливаем чёрным)
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Рисуем змейку (зелёные квадраты)
            ctx.fillStyle = 'green';
            for (let segment of snake) {
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
            }

            // Рисуем еду (красный квадрат)
            ctx.fillStyle = 'red';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        // Сброс игры при столкновении
        function resetGame() {
            snake = [{x: 10, y: 10}];
            velocityX = 0;
            velocityY = 0;
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
        }

        // Обработка нажатий клавиш
        document.addEventListener('keydown', function(e) {
            switch (e.key) {
                case 'ArrowUp':
                    if (velocityY !== 1) { // Запрещаем разворачиваться на 180 градусов
                        velocityX = 0;
                        velocityY = -1;
                    }
                    break;
                case 'ArrowDown':
                    if (velocityY !== -1) {
                        velocityX = 0;
                        velocityY = 1;
                    }
                    break;
                case 'ArrowLeft':
                    if (velocityX !== 1) {
                        velocityX = -1;
                        velocityY = 0;
                    }
                    break;
                case 'ArrowRight':
                    if (velocityX !== -1) {
                        velocityX = 1;
                        velocityY = 0;
                    }
                    break;
            }
        });

        // Запуск игры
        gameLoop();
    </script>
</body>
</html>
